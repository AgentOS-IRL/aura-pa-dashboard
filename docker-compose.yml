services:
  aura-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3007:3001"
    volumes:
      - ./uploads:/app/backend/uploads # keep uploads on the host so media can persist across container restarts
      - ./data:/app/backend/data # persist the SQLite database
    environment:
      NODE_ENV: "production"
      PORT: "3001"
      REDIS_HOST: "host.docker.internal"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "backend/server.js"]
    user: "node"
    restart: unless-stopped
