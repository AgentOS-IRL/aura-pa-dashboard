openapi: 3.1.0
info:
  title: Aura PA Backend Health Service
  version: 1.0.0
  description: Minimal HTTP service that exposes the deployment health for observability and automation.
  contact:
    name: Aura Platform Team
    email: platform-team@example.com
servers:
  - url: '{basePath}'
    description: Swagger docs use the configured `AURA_BASE_PATH` (default `/aura`).
    variables:
      basePath:
        default: /aura
        description: Override with your runtime base path so the UI and generated clients call the right routes.
paths:
  /health:
    get:
      tags:
        - Health
      summary: Returns the current service health state
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: number
                    description: Seconds since the process started
                  version:
                    type: string
                    description: Service version that matches package.json
                  timestamp:
                    type: string
                    format: date-time
                required:
                  - status
                  - uptime
                  - version
                  - timestamp
  /sessions/{sessionId}/audio:
    post:
      tags:
        - Audio
      summary: Append a recorded audio chunk for a workout session
      parameters:
        - name: sessionId
          in: path
          description: Identifier for the current workout session
          required: true
          schema:
            type: string
        - name: executorId
          in: query
          required: false
          description: Identifier AgentOS publishes on `agentos/status` (required if the `X-Aura-Executor-Id` header is absent)
          schema:
            type: string
        - name: X-Aura-Executor-Id
          in: header
          required: false
          description: Executor identifier that matches the `executorId` query parameter (either value is required)
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
                  description: Audio blob captured from the client
              required:
                - audio
      responses:
        '201':
          description: Chunk accepted and stored in Redis
        '400':
          description: Missing sessionId or audio payload
        '409':
          description: Executor is missing or reports an unhealthy status so audio was not persisted
        '500':
          description: Backend failed to persist the audio chunk
  /sessions/{sessionId}/transcript:
    post:
      tags:
        - Transcript
      summary: Persist a transcript payload for the session
      parameters:
        - name: sessionId
          in: path
          description: Identifier for the current session
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: string
                  description: Transcript text to persist
                metadata:
                  type: object
                  additionalProperties: true
                  description: Optional context that is stored alongside the payload
              required:
                - payload
      responses:
        '201':
          description: Transcript stored successfully
        '400':
          description: Missing or invalid sessionId/payload/metadata
        '500':
          description: Backend failed to persist the transcript
    get:
      tags:
        - Transcript
      summary: Read stored transcript records for a session
      parameters:
        - name: sessionId
          in: path
          description: Identifier for the current session
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Page number to return (1-indexed, defaults to 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Optional limit on how many transcript entries to return (defaults to 25, capped at 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Transcript rows for the requested session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptPage'
        '400':
          description: Missing or invalid sessionId or query parameters
        '500':
          description: Backend failed to fetch transcripts
  /transcripts:
    get:
      tags:
        - Transcript
      summary: Read the global transcript history
      description: >
        Returns a paginated feed of every transcript row sorted by newest entries first
        (ordered by `receivedAt` descending with `id` as a tie-breaker). Each record still
        surfaces the originating session ID so you can trace which session produced the text.
      parameters:
        - name: page
          in: query
          description: Page number to return (1-indexed, defaults to 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Optional limit on how many transcript entries to return (defaults to 25, capped at 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Transcript rows across all sessions, newest-first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptPage'
        '400':
          description: Invalid pagination parameters
        '500':
          description: Backend failed to fetch transcripts
    delete:
      tags:
        - Transcript
      summary: Purge every saved transcript
      description: >
        Deletes all rows from the `transcripts` table so the global history can be reset.
        Use this route with caution: the operation is irreversible and removes every persisted entry.
      responses:
        '204':
          description: Transcript table cleared
        '500':
          description: Backend failed to delete the transcripts
  /usage:
    get:
      tags:
        - Usage
      summary: Proxy OpenAI usage data for the dashboard
      responses:
        '200':
          description: Shielded response returned directly from OpenAI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodexUsage'
        '502':
          description: Unable to reach OpenAI or missing credentials
components:
  schemas:
    TranscriptRecord:
      type: object
      properties:
        sessionId:
          type: string
          description: Session that produced the transcript entry
        payload:
          type: string
          description: Actual transcript text
        metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional context stored with the entry
        receivedAt:
          type: string
          format: date-time
          description: When the transcript was recorded
      required:
        - sessionId
        - payload
        - receivedAt
    TranscriptPage:
      type: object
      properties:
        transcripts:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptRecord'
        page:
          type: integer
          description: Page number included in the response
        limit:
          type: integer
          description: Number of entries returned per page
        total:
          type: integer
          description: Total number of matching transcript rows
        hasMore:
          type: boolean
          description: Whether additional pages exist beyond this response
      required:
        - transcripts
        - page
        - limit
        - total
        - hasMore
      example:
        transcripts:
          - sessionId: session-1
            payload: Hello Aura
            metadata:
              speaker: user
            receivedAt: 2026-04-01T12:00:00Z
          - sessionId: session-2
            payload: Welcome back
            metadata: null
            receivedAt: 2026-04-01T12:01:00Z
        page: 1
        limit: 25
        total: 2
        hasMore: false
    CodexUsage:
      type: object
      properties:
        plan_type:
          type: string
        rate_limit:
          $ref: '#/components/schemas/RateLimit'
        code_review_rate_limit:
          type: object
          nullable: true
          additionalProperties: true
        additional_rate_limits:
          type: object
          nullable: true
          additionalProperties: true
        credits:
          $ref: '#/components/schemas/Credits'
        spend_control:
          $ref: '#/components/schemas/SpendControl'
        promo:
          type: object
          nullable: true
          additionalProperties: true
    RateLimit:
      type: object
      properties:
        allowed:
          type: boolean
        limit_reached:
          type: boolean
        primary_window:
          $ref: '#/components/schemas/RateLimitWindow'
        secondary_window:
          $ref: '#/components/schemas/RateLimitWindow'
    RateLimitWindow:
      type: object
      properties:
        used_percent:
          type: number
        limit_window_seconds:
          type: number
        reset_after_seconds:
          type: number
        reset_at:
          type: number
          description: Unix timestamp (seconds) when the window resets
    Credits:
      type: object
      properties:
        has_credits:
          type: boolean
        unlimited:
          type: boolean
        overage_limit_reached:
          type: boolean
        balance:
          type: string
        approx_local_messages:
          type: array
          items:
            type: integer
          nullable: true
        approx_cloud_messages:
          type: array
          items:
            type: integer
          nullable: true
    SpendControl:
      type: object
      properties:
        reached:
          type: boolean
        total: 2
        hasMore: false
