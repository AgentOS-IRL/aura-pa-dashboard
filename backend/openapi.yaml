openapi: 3.1.0
info:
  title: Aura PA Backend Health Service
  version: 1.0.0
  description: Minimal HTTP service that exposes the deployment health for observability and automation.
  contact:
    name: Aura Platform Team
    email: platform-team@example.com
paths:
  /health:
    get:
      tags:
        - Health
      summary: Returns the current service health state
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: number
                    description: Seconds since the process started
                  version:
                    type: string
                    description: Service version that matches package.json
                  timestamp:
                    type: string
                    format: date-time
                required:
                  - status
                  - uptime
                  - version
                  - timestamp
  /sessions/{sessionId}/audio:
    post:
      tags:
        - Audio
      summary: Append a recorded audio chunk for a workout session
      parameters:
        - name: sessionId
          in: path
          description: Identifier for the current workout session
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
                  description: Audio blob captured from the client
              required:
                - audio
      responses:
        '201':
          description: Chunk accepted and stored in Redis
        '400':
          description: Missing sessionId or audio payload
        '500':
          description: Backend failed to persist the audio chunk
  /sessions/{sessionId}/transcript:
    post:
      tags:
        - Transcript
      summary: Persist a transcript payload for the session
      parameters:
        - name: sessionId
          in: path
          description: Identifier for the current session
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: string
                  description: Transcript text to persist
                metadata:
                  type: object
                  additionalProperties: true
                  description: Optional context that is stored alongside the payload
              required:
                - payload
      responses:
        '201':
          description: Transcript stored successfully
        '400':
          description: Missing or invalid sessionId/payload/metadata
        '500':
          description: Backend failed to persist the transcript
